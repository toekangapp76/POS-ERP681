name: Deploy to cPanel

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FTP_HOST: ${{ secrets.FTP_HOST }}
  FTP_USER: ${{ secrets.FTP_USER }}
  FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
  DEPLOY_PATH: /public_html/Ascend/ 

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, zip, curl
          tools: composer:v2

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Composer dependencies
        run: composer install --ignore-platform-reqs --no-dev --no-interaction --no-scripts

    #   - name: Setup Node.js
    #     uses: actions/setup-node@v4
    #     with:
    #       node-version: '20'
    #       cache: 'npm'

    #   - name: Install NPM dependencies
    #     run: npm ci

    #   - name: Build assets
    #     run: npm run production

      - name: Prepare deployment files
        run: |
          # Remove development files that shouldn't be deployed
          rm -rf node_modules
          rm -rf tests
          rm -rf .git
          rm -rf .github
          rm -f .gitignore
          rm -f .env.example
          rm -f phpunit.xml
          rm -f package.json
          rm -f package-lock.json
          rm -f webpack.mix.js
          rm -f vite.config.js 2>/dev/null || true

    #   - name: Deploy to cPanel via FTP
    #     uses: SamKirkland/FTP-Deploy-Action@v4.3.4
    #     with:
    #       server: ${{ secrets.FTP_HOST }}
    #       username: ${{ secrets.FTP_USER }}
    #       password: ${{ secrets.FTP_PASSWORD }}
    #       server-dir: ${{ env.DEPLOY_PATH }}
    #       exclude: |
    #         **/.git*
    #         **/.git*/**
    #         **/node_modules/**
    #         **/tests/**
    #         .env
    #         .env.example
    #         phpunit.xml
    #         package.json
    #         package-lock.json
    #         webpack.mix.js
    #         vite.config.js
    
      - name: Deploy via SFTP
        uses: wangyucode/sftp-upload-action@v2.0.2
        with:
            host: ${{ secrets.FTP_HOST }}
            port: 21
            username: ${{ secrets.FTP_USER }}
            password: ${{ secrets.FTP_PASSWORD }}
            localDir: './.'
            remoteDir: ${{ env.DEPLOY_PATH }}
            # skipCreateDir: false
            exclude: |
                **/.git*
                **/.git*/**
                **/node_modules/**
                **/tests/**
                .env
                .env.example
                phpunit.xml
                package.json
                package-lock.json
                webpack.mix.js
                vite.config.js

